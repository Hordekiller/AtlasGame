<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8E8E8"/>
      <stop offset="50%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#C0C0C0"/>
    </linearGradient>
    <linearGradient id="guard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A843"/>
      <stop offset="100%" style="stop-color:#8B6914"/>
    </linearGradient>
    <linearGradient id="grip" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5C3A1E"/>
      <stop offset="50%" style="stop-color:#7A4E2D"/>
      <stop offset="100%" style="stop-color:#4A2E14"/>
    </linearGradient>
  </defs>
  <g transform="rotate(45, 32, 32)">
    <!-- Blade -->
    <polygon points="32,2 36,10 34,10 34,38 30,38 30,10 28,10" fill="url(#blade)" stroke="#999" stroke-width="0.5"/>
    <!-- Blade tip -->
    <polygon points="32,2 28,10 36,10" fill="#FFFFFF" stroke="#999" stroke-width="0.5"/>
    <!-- Guard -->
    <rect x="22" y="38" width="20" height="4" rx="1" fill="url(#guard)" stroke="#6B4F10" stroke-width="0.5"/>
    <!-- Guard gem -->
    <rect x="30" y="38" width="4" height="4" rx="1" fill="#E03030"/>
    <!-- Grip -->
    <rect x="28" y="42" width="8" height="12" rx="1" fill="url(#grip)" stroke="#3A2010" stroke-width="0.5"/>
    <!-- Grip rings -->
    <rect x="28" y="44" width="8" height="1.5" fill="#8B6914"/>
    <rect x="28" y="48" width="8" height="1.5" fill="#8B6914"/>
    <rect x="28" y="52" width="8" height="1.5" fill="#8B6914"/>
    <!-- Pommel -->
    <circle cx="32" cy="56" r="3" fill="url(#guard)" stroke="#6B4F10" stroke-width="0.5"/>
    <circle cx="32" cy="57" r="1" fill="#E03030"/>
  </g>
</svg>
